<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4 font-sans">
    <div class="w-full max-w-lg bg-white border border-gray-200 rounded-lg p-8 shadow-sm my-8">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-900">Inscription</h2>
            <p class="text-gray-500 mt-2 text-sm">Créez votre compte pour gérer vos tâches</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">

            <div *ngIf="errorMessage"
                class="p-3 bg-red-50 border border-red-200 rounded text-red-600 text-sm text-center">
                {{ errorMessage }}
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
                    <input type="text" formControlName="first_name"
                        class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Jean" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
                    <input type="text" formControlName="last_name"
                        class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Dupont" />
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" formControlName="email" placeholder="nom@exemple.com"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
                <input type="text" formControlName="username" placeholder="jdupont"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                <input type="password" formControlName="password" placeholder="••••••••"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Profil utilisateur</label>
                <select formControlName="role"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                    <option value="ETUDIANT">Étudiant</option>
                    <option value="PROFESSEUR">Professeur</option>
                </select>
            </div>

            <!-- On a retiré le bloc de debug -->

            <button type="submit" [disabled]="registerForm.invalid || isLoading"
                class="w-full py-2.5 mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-md shadow-sm disabled:opacity-50 disabled:cursor-not-allowed transition-colors cursor-pointer flex justify-center items-center">
                <span *ngIf="isLoading" class="mr-2">...</span>
                S'inscrire
            </button>

        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            Déjà un compte ?
            <button (click)="navigateToLogin()"
                class="font-medium text-indigo-600 hover:text-indigo-500 ml-1 cursor-pointer">
                Connectez-vous
            </button>
        </div>

    </div>
</div>
