<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4 font-sans">
    <div class="w-full max-w-md bg-white border border-gray-200 rounded-lg p-8 shadow-sm">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-900">Connexion</h2>
            <p class="text-gray-500 mt-2 text-sm">Accédez à votre espace collaboratif</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

            <!-- Error Message -->
            <div *ngIf="errorMessage"
                class="p-3 bg-red-50 border border-red-200 rounded text-red-600 text-sm text-center">
                {{ errorMessage }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
                <input type="text" formControlName="username"
                    class="w-full border border-gray-300 rounded-md px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="Votre nom d'utilisateur" />
                <p *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
                    class="text-red-500 text-xs mt-1">Le nom d'utilisateur est requis.</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                <input type="password" formControlName="password"
                    class="w-full border border-gray-300 rounded-md px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="••••••••" />
                <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                    class="text-red-500 text-xs mt-1">Le mot de passe est requis.</p>
            </div>

            <button type="submit" [disabled]="loginForm.invalid || isLoading"
                class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-md shadow-sm disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center cursor-pointer transition-colors">
                <span *ngIf="isLoading" class="mr-2">...</span>
                Se connecter
            </button>

        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            Pas encore de compte ?
            <button (click)="navigateToRegister()"
                class="font-medium text-indigo-600 hover:text-indigo-500 ml-1 cursor-pointer">
                Inscrivez-vous
            </button>
        </div>

    </div>
</div>
