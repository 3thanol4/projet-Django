<div class="min-h-screen bg-gray-50 text-gray-900 p-6 lg:p-12 font-sans">
    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            <h1 class="text-3xl font-bold text-gray-900">
                Mon Profil
            </h1>
            <div class="flex gap-4">
                <a routerLink="/dashboard"
                    class="px-4 py-2 bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 rounded-md transition-colors cursor-pointer shadow-sm text-sm font-medium">
                    Retour
                </a>
                <button (click)="logout()"
                    class="px-4 py-2 bg-white border border-red-300 text-red-600 hover:bg-red-50 rounded-md transition-colors cursor-pointer shadow-sm text-sm font-medium">
                    Déconnexion
                </button>
            </div>
        </div>

        <!-- Success & Error states -->
        <div *ngIf="successMessage"
            class="mb-6 p-4 bg-green-50 border border-green-200 rounded-md text-green-700 text-sm">
            {{ successMessage }}
        </div>
        <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-md text-red-700 text-sm">
            {{ errorMessage }}
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

            <!-- Profile Information Card -->
            <div class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
                <h3 class="text-lg font-bold text-gray-900 mb-4 border-b pb-2">Informations personnelles</h3>

                <form [formGroup]="profileForm" (ngSubmit)="updateProfile()" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
                            <input formControlName="first_name" type="text"
                                class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
                            <input formControlName="last_name" type="text"
                                class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input formControlName="email" type="email"
                            class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <button type="submit" [disabled]="profileForm.invalid || isLoading"
                        class="w-full py-2 mt-4 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 font-medium rounded-md transition-colors disabled:opacity-50 cursor-pointer text-sm">
                        Mettre à jour
                    </button>
                </form>
            </div>

            <!-- Password Change Card -->
            <div class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm h-fit">
                <h3 class="text-lg font-bold text-gray-900 mb-4 border-b pb-2">Sécurité</h3>

                <form [formGroup]="passwordForm" (ngSubmit)="updatePassword()" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nouveau mot de passe</label>
                        <input formControlName="new_password" type="password" placeholder="••••••••"
                            class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <button type="submit" [disabled]="passwordForm.invalid || isLoading"
                        class="w-full py-2 mt-4 bg-gray-50 text-gray-700 border border-gray-300 hover:bg-gray-100 font-medium rounded-md transition-colors disabled:opacity-50 cursor-pointer text-sm">
                        Modifier le mot de passe
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>
