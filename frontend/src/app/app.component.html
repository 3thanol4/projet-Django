<main class="w-full min-h-screen bg-gray-50 text-gray-900 font-sans antialiased flex">

  <!-- Sidebar Navigation -->
  <aside *ngIf="authService.currentUser()"
    class="w-64 bg-white border-r border-gray-200 flex flex-col z-20 hidden md:flex shadow-sm">
    <div class="p-6 border-b border-gray-200">
      <h1 class="text-2xl font-bold text-indigo-600">
        TaskFlow ESMT
      </h1>
    </div>

    <nav class="flex-1 p-4 space-y-1 mt-4">
      <a routerLink="/dashboard" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
        [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-md transition-colors cursor-pointer">
        <svg class="w-5 h-5 mr-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
          </path>
        </svg>
        Tableau de bord
      </a>
      <a routerLink="/stats" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
        [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-md transition-colors cursor-pointer">
        <svg class="w-5 h-5 mr-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6">
          </path>
        </svg>
        Statistiques
      </a>
    </nav>

    <div class="p-4 border-t border-gray-200">
      <a routerLink="/profile"
        class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-md transition-colors cursor-pointer">
        <div
          class="w-9 h-9 rounded-full bg-indigo-100 text-indigo-700 mr-3 flex items-center justify-center font-bold text-sm">
          {{ authService.currentUser()?.first_name?.charAt(0) || 'U' }}
        </div>
        <div class="flex-1 truncate">
          <p class="text-sm font-medium text-gray-900 truncate">
            {{ authService.currentUser()?.first_name }} {{ authService.currentUser()?.last_name }}
          </p>
          <p class="text-xs text-gray-500 truncate mt-0.5">{{ authService.currentUser()?.role | titlecase }}</p>
        </div>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
    <div class="flex-1 overflow-y-auto w-full z-10 relative">
      <div class="p-4 md:p-8 max-w-7xl mx-auto min-h-full">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</main>
